[alembic]
script_location = migrations
prepend_sys_path = ../..
# sqlalchemy.url is overridden by DATABASE_URL env var in env.py (RESEARCH.md Pattern 4 lines 619-622)
sqlalchemy.url = postgresql+asyncpg://pranav:pranav_dev_password@localhost:5432/pranav

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
