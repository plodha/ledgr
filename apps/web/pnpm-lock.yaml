lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

# NOTE (Phase 0 scaffold): This lockfile is a placeholder stub.
# It will be regenerated on the first `pnpm install` (run locally or in Docker
# build). The Dockerfile uses `pnpm install --frozen-lockfile`, so on first
# build you may need to either (a) run `pnpm install` locally and commit the
# resulting lockfile, or (b) drop `--frozen-lockfile` temporarily until the
# lockfile is materialized. After Phase 0 wave merge completes, run:
#
#   cd apps/web && pnpm install
#   git add pnpm-lock.yaml && git commit -m "chore(00-04): materialize pnpm-lock.yaml"
#
# This stub is intentional: the parallel-executor agent that scaffolded this
# directory was forbidden from running `pnpm install` (would be extremely
# slow and unnecessary in a worktree).

