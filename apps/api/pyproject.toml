# ----------------------------------------------------------------------------
# apps/api/pyproject.toml
#
# TOOL CONFIGURATION ONLY. requirements.txt is the source of truth for runtime
# dependencies; requirements-dev.txt is the source of truth for tooling deps.
# No build-system or project metadata sections — the api package is delivered
# as a directory inside `apps/`, never as a wheel.
# ----------------------------------------------------------------------------

[tool.ruff]
line-length = 120
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
# ruff "ALL" minus highly opinionated rules (RESEARCH.md Discretion line 59 recommendation)
select = ["E", "W", "F", "I", "B", "UP", "N", "S", "C4", "SIM", "PT", "RUF"]
ignore = ["S101"]   # allow assert in tests

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106"]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportMissingTypeStubs = false
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# anyio is the official FastAPI test backend; pytest-asyncio installed for flexibility
filterwarnings = [
  "error",
  "ignore::DeprecationWarning:asyncio",
]
